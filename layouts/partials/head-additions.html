<link rel="stylesheet" href="/css/custom.css">
<script src="https://cdn.bootcdn.net/ajax/libs/mermaid/10.9.0/mermaid.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    mermaid.initialize({
      startOnLoad: true,
      theme: 'default',
      securityLevel: 'loose',
      flowchart: { useMaxWidth: true }
    });

    var graphs = document.querySelectorAll('pre code.language-mermaid, pre.mermaid, div.mermaid');
    graphs.forEach(function(graph) {
      mermaid.run([graph]);
    });

    // 给所有 table 包裹 .table-wrapper，防止移动端溢出
    document.querySelectorAll('article table, .entry-content table').forEach(function(table) {
      if (!table.parentElement.classList.contains('table-wrapper')) {
        var wrapper = document.createElement('div');
        wrapper.className = 'table-wrapper';
        table.parentNode.insertBefore(wrapper, table);
        wrapper.appendChild(table);
      }
    });
  });
</script>

<style>
  .mermaid {
    background: #f8f9fa;
    padding: 20px;
    border-radius: 8px;
    margin: 20px 0;
    text-align: center;
    display: flex;
    justify-content: center;
    max-width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    box-sizing: border-box;
  }
  .mermaid svg {
    margin: 0 auto;
    max-width: 100%;
    height: auto !important;
  }
</style>
