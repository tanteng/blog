<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你好 👋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 520px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .hero {
            position: relative;
            height: 280px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #ffd1ff 100%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .hero-photo {
            position: absolute;
            bottom: -60px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            background: #fff;
        }
        .hero-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .hero-photo .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            background: linear-gradient(135deg, #ffe5e5 0%, #fff0f0 100%);
        }
        .content {
            padding: 80px 32px 32px;
            text-align: center;
        }
        .name {
            font-size: 26px;
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
        }
        .age-location {
            color: #888;
            font-size: 15px;
            margin-bottom: 24px;
        }
        .intro-text {
            color: #555;
            font-size: 15px;
            line-height: 1.9;
            margin-bottom: 28px;
        }
        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #ff9a9e, #ffd1ff);
            border-radius: 2px;
            margin: 0 auto 28px;
        }
        .section {
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #ff9a9e;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 14px;
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        .tag {
            background: #fff5f5;
            color: #666;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        .photos-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 8px;
        }
        .photo-item {
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            background: #f8f8f8;
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .photo-item .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #ccc;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        }
        .footer {
            padding: 24px 32px 32px;
            text-align: center;
        }
        .footer-text {
            color: #aaa;
            font-size: 14px;
        }
        .heart {
            display: inline-block;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        @media (max-width: 480px) {
            .hero { height: 240px; }
            .hero-photo { width: 110px; height: 110px; bottom: -50px; }
            .content { padding: 70px 24px 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <!-- 主照片位置 -->
            <div class="hero-photo">
                <img src="avatar.jpg" alt="我" onerror="this.style.display='none';this.parentNode.innerHTML='<div class="placeholder">📷</div>'">
            </div>
        </div>
        
        <div class="content">
            <div class="name">Tony</div>
            <div class="age-location">91年 · 湖北人 · 深圳</div>
            
            <p class="intro-text">
                互联网技术男，工作8年，平时喜欢打羽毛球、跑步、看书📚<br>
                周末有时候爬山🏔️或者和朋友聚聚，性格随和好相处～
            </p>
            
            <div class="divider"></div>
            
            <div class="section">
                <div class="section-title">我的标签</div>
                <div class="tags">
                    <span class="tag">🏸 羽毛球</span>
                    <span class="tag">📚 阅读</span>
                    <span class="tag">🏃 跑步</span>
                    <span class="tag">⛰️ 爬山</span>
                    <span class="tag">🍳 做饭</span>
                </div>
            </div>
            
            <div class="section">
                <div class="section-title">我的生活</div>
                <div class="photos-grid">
                    <!-- 照片位置 1-6 -->
                    <div class="photo-item"><img src="photo1.jpg" alt="" onerror="this.style.display='none';this.parentNode.innerHTML='<div class="placeholder">📷</div>'"></div>
                    <div class="photo-item"><img src="photo2.jpg" alt="" onerror="this.style.display='none';this.parentNode.innerHTML='<div class="placeholder">📷</div>'"></div>
                    <div class="photo-item"><img src="photo3.jpg" alt="" onerror="this.style.display='none';this.parentNode.innerHTML='<div class="placeholder">📷</div>'"></div>
                    <div class="photo-item"><img src="photo4.jpg" alt="" onerror="this.style.display='none';this.parentNode.innerHTML='<div class="placeholder">📷</div>'"></div>
                    <div class="photo-item"><img src="photo5.jpg" alt="" onerror="this.style.display='none';this.parentNode.innerHTML='<div class="placeholder">📷</div>'"></div>
                    <div class="photo-item"><img src="photo6.jpg" alt="" onerror="this.style.display='none';this.parentNode.innerHTML='<div class="placeholder">📷</div>'"></div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p class="footer-text">
                <span class="heart">💕</span> 期待认识你
            </p>
        </div>
    </div>
</body>
</html>
