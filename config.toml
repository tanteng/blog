baseURL = "https://blog.tanteng.space"
defaultContentLanguage = 'zh'
title = "Tony老师的博客"
theme = "ananke"
resourceDir = "../resources"
sectionPagesMenu = "main"

[related]
  threshold = 80
  toLower = false
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 80

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 1

  [[menu.main]]
    identifier = "photos"
    name = "相册"
    url = "https://photos.tanteng.space"
    weight = 2

  [[menu.main]]
    identifier = "tech"
    name = "技术"
    url = "/categories/tech/"
    weight = 3

  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 4

[pagination]
paginate = 20

[params]
customCSS = ["css/custom.css"]
mainSections = ["posts"]
recent_posts_number = 20
featured_image = "https://tanteng.space/blog-cover.jpg"
description = "记录生活与成长的空间。热爱摄影、旅行、技术，这里有技术笔记与生活随想。"
copyright = "谈腾"
open_graph_title = "Tony老师的博客"
open_graph_description = "Hi，我是Tony老师"
open_graph_image = "/images/og-image.jpg"

[params.ananke.social.follow]
networks = [
  "instagram",
  "facebook",
  "linkedin"
]

[params.ananke.social.instagram]
username = "tanteng1031"

[params.ananke.social.facebook]
username = "tanteng001"

[params.ananke.social.linkedin]
username = "tanteng"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[markup.mermaid]
  generateSWM = true

