# Build Hugo site → Upload to Tencent COS → Purge EdgeOne cache
name: Deploy to COS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Prevent concurrent deployments
concurrency:
  group: deploy-cos
  cancel-in-progress: true

env:
  HUGO_VERSION: '0.146.4'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        run: |
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin hugo
          hugo version

      - name: Build
        run: hugo --minify

      - name: Install coscli
        run: |
          curl -fsSL https://cosbrowser.cloud.tencent.com/software/coscli/coscli-linux-amd64 -o /usr/local/bin/coscli
          chmod +x /usr/local/bin/coscli

      - name: Upload to COS
        run: |
          coscli sync ./public/ cos://${{ secrets.TENCENT_BUCKET }}/ \
            -r \
            -e cos.${{ secrets.TENCENT_REGION }}.myqcloud.com \
            -i ${{ secrets.TENCENT_SECRET_ID }} \
            -k ${{ secrets.TENCENT_SECRET_KEY }} \
            --delete

      - name: Install tccli
        run: pip install tccli

      - name: Detect changed posts
        id: changed-posts
        run: |
          # 获取本次修改的文章文件
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          
          # 提取 content/posts/ 下的 .md 文件（排除 index.md 等）
          POSTS=$(echo "$CHANGED_FILES" | grep "^content/posts/.*\.md$" | grep -v "index.md" || true)
          
          if [ -n "$POSTS" ]; then
            echo "检测到修改的文章:"
            echo "$POSTS"
            # 生成文章 URL 列表
            ARTICLE_URLS=""
            for file in $POSTS; do
              # 从文件名提取 slug（去掉 .md 后缀）
              slug=$(basename "$file" .md)
              url="https://blog.tanteng.space/posts/${slug}/"
              ARTICLE_URLS="${ARTICLE_URLS}\"${url}\","
            done
            # 去掉最后的逗号
            ARTICLE_URLS=${ARTICLE_URLS%,}
            echo "ARTICLE_URLS=[$ARTICLE_URLS]" >> $GITHUB_OUTPUT
          else
            echo "未检测到文章修改"
            echo "ARTICLE_URLS=" >> $GITHUB_OUTPUT
          fi

      - name: Purge EdgeOne Cache (common pages)
        env:
          TENCENTCLOUD_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENTCLOUD_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        run: |
          # 清理首页
          tccli teo CreatePurgeTask \
            --region ap-guangzhou \
            --ZoneId "${{ secrets.EDGEONE_ZONE_ID }}" \
            --Type purge_host \
            --Targets '["https://blog.tanteng.space/"]'
          
          # 清理文章列表页
          tccli teo CreatePurgeTask \
            --region ap-guangzhou \
            --ZoneId "${{ secrets.EDGEONE_ZONE_ID }}" \
            --Type purge_host \
            --Targets '["https://blog.tanteng.space/posts/"]'
          
          # 清理分类页面
          tccli teo CreatePurgeTask \
            --region ap-guangzhou \
            --ZoneId "${{ secrets.EDGEONE_ZONE_ID }}" \
            --Type purge_host \
            --Targets '["https://blog.tanteng.space/categories/"]'
          
          # 清理标签页面
          tccli teo CreatePurgeTask \
            --region ap-guangzhou \
            --ZoneId "${{ secrets.EDGEONE_ZONE_ID }}" \
            --Type purge_host \
            --Targets '["https://blog.tanteng.space/tags/"]'
          
          echo "✅ Common pages cache purged"

      - name: Purge article cache
        if: steps.changed-posts.outputs.ARTICLE_URLS != ''
        env:
          TENCENTCLOUD_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENTCLOUD_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        run: |
          ARTICLE_URLS=${{ steps.changed-posts.outputs.ARTICLE_URLS }}
          
          # 清理修改的文章页面
          tccli teo CreatePurgeTask \
            --region ap-guangzhou \
            --ZoneId "${{ secrets.EDGEONE_ZONE_ID }}" \
            --Type purge_host \
            --Targets "[${ARTICLE_URLS}]"
          
          echo "✅ Article pages cache purged"
