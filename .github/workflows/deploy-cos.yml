# Build and deploy Hugo site to Tencent COS
name: Deploy to COS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.146.4'
          extended: true

      - name: Build
        run: hugo

      - name: Upload to COS
        uses: zkqiang/tencent-cos-action@v0.1.0
        with:
          args: upload -r ./public/ /
          secret_id: ${{ secrets.TENCENT_SECRET_ID }}
          secret_key: ${{ secrets.TENCENT_SECRET_KEY }}
          bucket: ${{ secrets.TENCENT_BUCKET }}
          region: ${{ secrets.TENCENT_REGION }}

      - name: Setup Tencent CLI
        if: success()
        uses: TencentCloud/tencentcloud-cli-action@v1.0

      - name: Purge EdgeOne Cache
        if: success()
        run: |
          # 清除 EdgeOne 缓存
          tccli edgeone PurgeHosts --Hosts '["blog.tanteng.space"]' --FlushType flush
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          TENCENT_REGION: ap-guangzhou
