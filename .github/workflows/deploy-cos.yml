# Build Hugo site → Upload to Tencent COS → Purge EdgeOne cache
name: Deploy to COS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Prevent concurrent deployments
concurrency:
  group: deploy-cos
  cancel-in-progress: true

env:
  HUGO_VERSION: '0.146.4'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 2

      - name: Setup Hugo
        run: |
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin hugo
          hugo version

      - name: Build
        run: hugo --minify

      - name: Install coscli
        run: |
          curl -fsSL https://cosbrowser.cloud.tencent.com/software/coscli/coscli-linux-amd64 -o /usr/local/bin/coscli
          chmod +x /usr/local/bin/coscli

      - name: Upload to COS
        run: |
          coscli sync ./public/ cos://${{ secrets.TENCENT_BUCKET }}/ \
            -r \
            -e cos.${{ secrets.TENCENT_REGION }}.myqcloud.com \
            -i ${{ secrets.TENCENT_SECRET_ID }} \
            -k ${{ secrets.TENCENT_SECRET_KEY }} \
            --delete

      - name: Install tccli
        run: pip install tccli

      - name: Detect changed posts
        id: changed-posts
        run: |
          # 安全获取 diff：如果 HEAD~1 不存在（首次提交或 shallow clone 不足），
          # 则回退到列出当前提交的所有文件
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          else
            echo "⚠️ 无法获取上一次提交，列出当前提交所有文件"
            CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r HEAD)
          fi

          # 提取 content/posts/ 下的 .md 文件
          POSTS=$(echo "$CHANGED_FILES" | grep "^content/posts/.*\.md$" || true)

          if [ -n "$POSTS" ]; then
            echo "检测到修改的文章:"
            echo "$POSTS"

            # 生成 JSON 数组格式的 URL 列表
            URLS_JSON="["
            FIRST=true
            for file in $POSTS; do
              slug=$(basename "$file" .md)
              url="https://blog.tanteng.space/posts/${slug}/"
              if [ "$FIRST" = true ]; then
                URLS_JSON="${URLS_JSON}\"${url}\""
                FIRST=false
              else
                URLS_JSON="${URLS_JSON},\"${url}\""
              fi
            done
            URLS_JSON="${URLS_JSON}]"

            echo "article_urls=${URLS_JSON}" >> "$GITHUB_OUTPUT"
            echo "has_articles=true" >> "$GITHUB_OUTPUT"
          else
            echo "未检测到文章修改"
            echo "has_articles=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Purge EdgeOne Cache
        env:
          TENCENTCLOUD_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENTCLOUD_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        run: |
          ZONE_ID="${{ secrets.EDGEONE_ZONE_ID }}"

          # 构建需要清理的 URL 列表：首页 + 文章列表 + 分类 + 标签
          COMMON_URLS='["https://blog.tanteng.space/","https://blog.tanteng.space/posts/","https://blog.tanteng.space/categories/","https://blog.tanteng.space/tags/"]'

          # 如果有修改的文章，追加到列表中
          HAS_ARTICLES="${{ steps.changed-posts.outputs.has_articles }}"
          if [ "$HAS_ARTICLES" = "true" ]; then
            ARTICLE_URLS='${{ steps.changed-posts.outputs.article_urls }}'
            # 合并两个 JSON 数组：去掉各自的 [] 再拼起来
            COMMON_INNER=$(echo "$COMMON_URLS" | sed 's/^\[//;s/\]$//')
            ARTICLE_INNER=$(echo "$ARTICLE_URLS" | sed 's/^\[//;s/\]$//')
            ALL_URLS="[${COMMON_INNER},${ARTICLE_INNER}]"
            echo "清理页面缓存（含文章）: ${ALL_URLS}"
          else
            ALL_URLS="$COMMON_URLS"
            echo "清理公共页面缓存: ${ALL_URLS}"
          fi

          tccli teo CreatePurgeTask \
            --region ap-guangzhou \
            --ZoneId "$ZONE_ID" \
            --Type purge_url \
            --Targets "$ALL_URLS"
          echo "✅ EdgeOne cache purged"
