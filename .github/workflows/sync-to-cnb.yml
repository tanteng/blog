name: Sync to CNB

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync to CNB
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            -w /repo \
            -e PLUGIN_TARGET_URL="https://cnb.cool/你的组织名/仓库名.git" \
            -e PLUGIN_AUTH_TYPE="https" \
            -e PLUGIN_USERNAME="cnb" \
            -e PLUGIN_PASSWORD="$CNB_TOKEN" \
            -e PLUGIN_FORCE="true" \
            tencentcom/git-sync
